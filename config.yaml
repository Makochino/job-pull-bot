database_path: "vacancies.db"
telethon_session: "telegram_user"
profile_name: "restaurant/cafe jobs in Odesa"

min_score: 5
max_results_per_pull: 20
auto_delete_messages_after_seconds: 600
batch_size: 5

telegram_posts_per_channel: 30
telegram_resend_latest_on_pull: false
telegram_latest_limit: 10
notify_user_on_startup: true
message_delay_seconds: 0.35

debug_parsing: true
website_request_timeout: 15
website_detail_pages_limit: 20
website_detail_delay_seconds: 0.7
website_user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
website_headers:
  Accept-Language: "ru-RU,ru;q=0.9,uk-UA;q=0.8,uk;q=0.7,en;q=0.6"
  Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"

