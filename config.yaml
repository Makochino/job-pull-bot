    - "part time"
    - "неполный день"
    - "неповний день"
    - "гибкий график"
    - "гнучкий графік"
    - "посменно"
    - "позмінно"
    - "ставка"
    - "чаевые"
    - "чайові"
    - "грн"
    - "Одесса"
    - "Odesa"

  hard_reject_keywords:
