database_path: "vacancies.db"
telethon_session: "telegram_user"
profile_name: "restaurant/cafe jobs in Odesa"

min_score: 5
max_results_per_pull: 20
auto_delete_messages_after_seconds: 600
batch_size: 5

telegram_scan_days: 3
telegram_scan_max_messages_per_channel: 0
notify_user_on_startup: true
message_delay_seconds: 0.35

debug_parsing: true

filters:
  locations:
    - "Одесса"
    - "Одеська"
    - "Odesa"
    - "Odessa"

  core_keywords:
    - "waiter"
    - "waitress"
    - "официант"
    - "официантка"
    - "офіціант"
    - "офіціантка"
    - "runner"
    - "раннер"
    - "ранер"
    - "помощник официанта"
    - "помічник офіціанта"
    - "помощник в зал"
    - "помічник у зал"
    - "hostess"
    - "хостес"

  restaurant_context_keywords:
    - "ресторан"
    - "ресторане"
    - "ресторані"
    - "кафе"
    - "coffee"
    - "кофейня"
    - "кав'ярня"
    - "бар"
    - "зал"
    - "гости"
    - "обслуживание гостей"
    - "обслуговування гостей"
    - "hospitality"
    - "HoReCa"

  bonus_keywords:
